# Squirrel settings
# encoding: utf-8
#
# squirrel[.custom].yaml 是鼠须管的前端配置文件，小狼毫是 weasel[.custom].yaml
# 各平台皮肤配置并不一致。
#
# 鼠须管内置皮肤展示： https://github.com/NavisLab/rime-pifu
# 鼠须管界面配置指南： https://github.com/LEOYoon-Tsaw/Rime_collections/blob/master/鼠鬚管介面配置指南.md
# 鼠须管作者写的图形化的皮肤设计器： https://github.com/LEOYoon-Tsaw/Squirrel-Designer

# Squirrel 部分命令行选项：
# squirrel="/Library/Input Methods/Squirrel.app/Contents/MacOS/Squirrel"
# --quit：退出所有 Squirrel 进程
# --reload：重新部署
# --sync：触发同步用户数据
# --build：构建
# --help：帮助输出帮助文本


# 要比共享目录的同名文件的 config_version 大才可以生效
config_version: '2026-01-31'  # 对应的鼠须管版本: 1.1.2


# 键盘布局  last | default | _custom_
# last: 上次使用的英文键盘布局
# default: US (ABC)
# _custom_: 自定义，例如 'com.apple.keylayout.USExtended' 或者 'USExtended'
keyboard_layout: last
# 并击输入  秒
chord_duration: 0.1
# 何时显示通知  always | never | appropriate
show_notifications_when: appropriate


# ascii_mode、inline、no_inline、vim_mode 等等设定
# 可参考 /Library/Input Methods/Squirrel.app/Contents/SharedSupport/squirrel.yaml
app_options:
  com.openai.codex:
    ascii_mode: false
  # com.apple.Spotlight:
  #   ascii_mode: true    # 开启默认英文
  # com.microsoft.VSCode:
  #   ascii_mode: false   # 关闭默认英文
  com.apple.Terminal:
    ascii_mode: true
  com.googlecode.iterm2:
    ascii_mode: true


style:
  color_scheme: wechat_light
  color_scheme_dark: wechat_dark

  candidate_list_layout: linear
  text_orientation: horizontal
  inline_preedit: true
  inline_candidate: false
  memorize_size: true
  translucency: false
  show_paging: false
  corner_radius: 10
  hilited_corner_radius: 0
  border_height: 0
  border_width: 0
  line_spacing: 5
  spacing: 10
  shadow_size: 0
  candidate_format: '[label]. [candidate] [comment]'
  font_face: "Lucida Grande"
  font_point: 21
  label_font_point: 18
  comment_font_point: 18


preset_color_schemes:
  wechat_light:
    name: "微信浅色／Wechat Light"
    font_face: "PingFangSC"
    font_point: 16
    label_font_face: "PingFangSC"
    label_font_point: 13
    comment_font_face: "PingFangSC"
    comment_font_point: 16
    candidate_format: "%c\u2005%@\u2005"
    candidate_list_layout: linear
    text_orientation: horizontal
    inline_preedit: true
    translucency: false
    border_height: 1
    border_width: 1
    corner_radius: 5
    hilited_corner_radius: 5
    shadow_size: 0
    line_spacing: 5
    alpha: 1
    spacing: 10
    color_space: srgb
    back_color: 0xFFFFFF
    hilited_candidate_back_color: 0x79af22
    label_color: 0x999999
    hilited_candidate_label_color: 0xFFFFFF
    candidate_text_color: 0x3c3c3c
    hilited_candidate_text_color: 0xFFFFFF
    comment_text_color: 0x999999
    hilited_comment_text_color: 0x999999
    text_color: 0x424242
    hilited_text_color: 0x999999
    candidate_back_color: 0xFFFFFF
    hilited_back_color: 0x79af22
    border_color: 0xFFFFFF

  wechat_dark:
    name: "微信深色／Wechat Dark"
    font_face: "PingFangSC"
    font_point: 16
    label_font_face: "PingFangSC"
    label_font_point: 13
    comment_font_face: "PingFangSC"
    comment_font_point: 16
    candidate_format: "%c\u2005%@\u2005"
    candidate_list_layout: linear
    text_orientation: horizontal
    inline_preedit: true
    translucency: false
    border_height: 1
    border_width: 1
    corner_radius: 5
    hilited_corner_radius: 5
    shadow_size: 0
    line_spacing: 5
    alpha: 1
    spacing: 10
    color_space: srgb
    back_color: 0x151515
    hilited_candidate_back_color: 0x79af22
    label_color: 0x999999
    hilited_candidate_label_color: 0xFFFFFF
    candidate_text_color: 0xbbbbbb
    hilited_candidate_text_color: 0xFFFFFF
    comment_text_color: 0x999999
    hilited_comment_text_color: 0xFFFFFF
    text_color: 0xbbbbbb
    hilited_text_color: 0x999999
    candidate_back_color: 0x151515
    hilited_back_color: 0x79af22
    border_color: 0x292929
