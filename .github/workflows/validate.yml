name: validate

on:
  push:
  pull_request:

jobs:
  config:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts and Rime snapshot
        run: |
          bash -n install.sh sync-from-local.sh scripts/validate.sh
          ./scripts/validate.sh rime
      - name: Verify idempotent test deployment
        run: |
          target="$(mktemp -d)"
          mkdir -p "$target/rime_ice.userdb" "$target/wanxiang.userdb" "$target/lua/sequence.userdb"
          touch "$target/rime_ice.schema.yaml" "$target/rime_ice.userdb/old" "$target/wanxiang.userdb/keep" "$target/lua/sequence.userdb/keep"
          RIME_USER_DIR="$target" RIME_SKIP_FRONTEND_INSTALL=1 RIME_SKIP_RELOAD=1 ./install.sh
          RIME_USER_DIR="$target" RIME_SKIP_FRONTEND_INSTALL=1 RIME_SKIP_RELOAD=1 ./install.sh
          test ! -e "$target/rime_ice.schema.yaml"
          test ! -e "$target/rime_ice.userdb"
          test -e "$target/wanxiang.userdb/keep"
          test -e "$target/lua/sequence.userdb/keep"
          test -e "$target/wanxiang.schema.yaml"
          find "$target" -depth -delete
